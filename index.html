<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VueloCheck VH - ViajaHoy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFF8F0; margin: 0; color: #1a1a1a; }
        .vc-card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(232,97,10,0.05); border: 1px solid #eee; margin-bottom: 20px; }
        .vc-btn { cursor: pointer; transition: all 0.2s; border: none; outline: none; }
        .vc-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .vc-input { border: 1px solid #eee; border-radius: 15px; padding: 12px 15px; width: 100%; font-weight: 700; outline: none; transition: all 0.3s; }
        .vc-input:focus { border-color: #E8610A; background: white; }
        #checklist-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 450px; border-radius: 40px; max-height: 85vh; overflow-y: auto; position: relative; }
        .animate-bounce { animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <!-- Pantalla de Carga -->
    <div id="loading-screen" style="position: fixed; inset: 0; background: #FFF8F0; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <img src="https://img.icons8.com/ios-filled/100/E8610A/airplane-mode-on.png" class="animate-bounce" style="width: 60px;">
        <p style="color: #E8610A; font-weight: 900; margin-top: 20px; letter-spacing: 2px;">VUELOCHECK VH</p>
    </div>

    <!-- App Principal -->
    <div id="app" style="display: none;">
        <nav style="background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-50;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="background: #E8610A; padding: 8px; border-radius: 12px;"><img src="https://img.icons8.com/ios-filled/50/ffffff/airplane-mode-on.png" style="width: 20px;"></div>
                <div><div style="font-weight: 900; font-size: 1.2rem; line-height: 1;">VUELOCHECK</div><div style="font-size: 0.6rem; color: #E8610A; font-weight: 900; letter-spacing: 2px;">VIAJAHOY</div></div>
            </div>
            <button onclick="logout()" style="color: #ccc;"><img src="https://img.icons8.com/ios-filled/50/cccccc/logout-rounded.png" style="width: 20px;"></button>
        </nav>

        <main style="padding: 30px 20px; max-width: 500px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 35px;">
                <h2 style="font-weight: 900; font-size: 2rem; margin-bottom: 5px; letter-spacing: -1px;">HOLA, VIAJERO</h2>
                <p style="color: #888; font-size: 0.9rem;">¿Qué vuelo rastreamos hoy?</p>
            </div>

            <!-- Buscador (Lo primero que se ve) -->
            <div style="display: flex; gap: 10px; margin-bottom: 40px; background: white; padding: 8px; border-radius: 22px; box-shadow: 0 15px 35px rgba(232,97,10,0.06); border: 1px solid #eee;">
                <input id="flight-input" class="vc-input" placeholder="Ej: AR1304" style="border: none;">
                <button onclick="searchFlight()" class="vc-btn" style="background: #E8610A; color: white; width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/search.png" style="width: 22px;">
                </button>
            </div>

            <div id="flight-list"></div>

            <!-- Botón Checklist -->
            <button onclick="openChecklist()" class="vc-btn" style="width: 100%; background: white; border: 1px solid #eee; padding: 20px; border-radius: 25px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.02);">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <img src="https://img.icons8.com/ios-filled/50/E8610A/list.png" style="width: 24px;">
                    <span style="font-weight: 900; font-size: 0.9rem;">MI CHECKLIST DE VIAJE</span>
                </div>
                <img src="https://img.icons8.com/ios-filled/50/cccccc/forward.png" style="width: 16px;">
            </button>

            <!-- Banner Premium (Sutil al final) -->
            <div style="background: white; border: 1px solid #eee; padding: 25px; border-radius: 35px; display: flex; align-items: center; justify-content: space-between; gap: 15px;">
                <div style="text-align: left;">
                    <h4 style="font-weight: 900; font-size: 0.8rem; color: #E8610A; margin-bottom: 2px;">PLAN PREMIUM BETA 💎</h4>
                    <p style="font-size: 0.65rem; color: #999; font-weight: 700;">Alertas 24/7 e ilimitados.</p>
                </div>
                <button onclick="window.open('https://buy.stripe.com/test_555', '_blank')" class="vc-btn" style="background: #E8610A; color: white; padding: 12px 20px; border-radius: 14px; font-weight: 900; font-size: 0.7rem;">Plan Viajero $5</button>
            </div>
        </main>
    </div>

    <!-- Login -->
    <div id="login-screen" style="display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;">
        <div style="background: #E8610A; padding: 25px; border-radius: 30px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(232,97,10,0.2);">
            <img src="https://img.icons8.com/ios-filled/100/ffffff/airplane-mode-on.png" style="width: 50px;">
        </div>
        <h1 style="font-weight: 900; font-size: 2rem; margin-bottom: 10px;">VUELOCHECK VH</h1>
        <p style="color: #888; margin-bottom: 40px; font-weight: 500;">Tu asistente de ViajaHoy.</p>
        <button onclick="login()" class="vc-btn" style="background: #E8610A; color: white; padding: 18px 40px; border-radius: 20px; font-weight: 900; width: 100%; max-width: 280px; box-shadow: 0 10px 20px rgba(232,97,10,0.2);">ENTRAR CON GOOGLE</button>
    </div>

    <!-- Modal Checklist -->
    <div id="checklist-modal">
        <div class="modal-content">
            <div style="padding: 30px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; sticky top-0 bg-white z-10;">
                <h2 style="font-weight: 900; font-size: 1.5rem;">CHECKLIST</h2>
                <div style="display: flex; gap: 10px;">
                    <button onclick="resetChecklist()" title="Reiniciar lista"><img src="https://img.icons8.com/ios-filled/50/E8610A/restart.png" style="width: 20px;"></button>
                    <button onclick="closeChecklist()"><img src="https://img.icons8.com/ios-filled/50/999999/multiply.png" style="width: 20px;"></button>
                </div>
            </div>
            <div id="checklist-items" style="padding: 20px;"></div>
            <div style="padding: 20px;"><button onclick="closeChecklist()" class="vc-btn" style="width: 100%; background: #E8610A; color: white; padding: 18px; border-radius: 20px; font-weight: 900;">LISTO</button></div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            projectId: "gen-lang-client-0933834825",
            appId: "1:542933361078:web:41e58120871a480bfd2117",
            apiKey: "AIzaSyB7JO2HnVxryuVEduIrfdRRWJw7VWsRq7c",
            authDomain: "gen-lang-client-0933834825.firebaseapp.com"
        };
        const DB_ID = "ai-studio-425c3005-83a4-42ee-97a4-c0e6353f3a0a";

        const DEFAULT_CHECKLIST = [
            { id: '1', text: 'Check-in online realizado', completed: false },
            { id: '2', text: 'Documentación (Pasaporte / DNI)', completed: false },
            { id: '3', text: 'Pasajes / Boarding Pass', completed: false },
            { id: '4', text: 'Reserva de Hotel / Alojamiento', completed: false },
            { id: '5', text: 'Seguro de Viaje / Asistencia', completed: false },
            { id: '6', text: 'Dinero / Tarjetas / Aviso al Banco', completed: false },
            { id: '7', text: 'Medicación si tomara', completed: false },
            { id: '8', text: 'Cargadores y Powerbank', completed: false },
            { id: '9', text: 'Adaptador de corriente universal', completed: false },
            { id: '10', text: 'Activar Roaming / Comprar Chip', completed: false },
            { id: '11', text: 'Copia de documentos en la nube', completed: false },
            { id: '12', text: 'Descargar mapas offline', completed: false },
            { id: '13', text: 'Auriculares y Entretenimiento', completed: false },
            { id: '14', text: 'Almohada de cuello / Antifaz', completed: false },
            { id: '15', text: 'Ropa adecuada al clima', completed: false },
            { id: '16', text: 'Artículos de aseo personal', completed: false },
            { id: '17', text: 'Botella de agua (vacía)', completed: false },
            { id: '18', text: 'Snacks para el viaje', completed: false },
            { id: '19', text: 'Llaves de casa y auto', completed: false }
        ];

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.app().firestore(DB_ID);
        let currentUser = null;
        let checklist = [];
        let isPremium = false;
        let searchCount = 0;

        auth.onAuthStateChanged(async (user) => {
            document.getElementById('loading-screen').style.display = 'none';
            if (user) {
                currentUser = user;
                document.getElementById('app').style.display = 'block';
                document.getElementById('login-screen').style.display = 'none';
                
                const doc = await db.collection('users').doc(user.uid).get();
                const data = doc.data();
                isPremium = data?.isPremium || false;
                searchCount = data?.searchCount || 0;
                checklist = data?.checklist || DEFAULT_CHECKLIST;
                if (checklist.length < 5) checklist = DEFAULT_CHECKLIST;
                renderChecklist();
                
                db.collection(`users/${user.uid}/flights`).onSnapshot(snap => {
                    const flights = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderFlights(flights);
                });
            } else {
                document.getElementById('app').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
            }
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); }

        async function searchFlight() {
            const num = document.getElementById('flight-input').value.trim().toUpperCase();
            if (!num) return;

            if (!isPremium && searchCount >= 2) {
                alert("¡Límite alcanzado! Pasate a Premium para rastreos ilimitados.");
                return;
            }

            // Guardar Vuelo
            await db.collection(`users/${currentUser.uid}/flights`).add({
                flightNumber: num,
                status: 'EN HORARIO',
                origin: { code: 'EZE' },
                destination: { code: 'MAD' },
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Incrementar contador
            searchCount++;
            await db.collection('users').doc(currentUser.uid).set({ searchCount }, { merge: true });
            
            document.getElementById('flight-input').value = '';
        }

        function renderFlights(flights) {
            const list = document.getElementById('flight-list');
            if (flights.length === 0) {
                list.innerHTML = `<div style="padding: 60px 0; text-align: center; opacity: 0.2;"><img src="https://img.icons8.com/ios-filled/100/000000/airplane-landing.png" style="width: 50px; margin: 0 auto 15px;"><p style="font-weight: 900; font-size: 0.6rem; letter-spacing: 2px;">SIN VUELOS ACTIVOS</p></div>`;
                return;
            }
            list.innerHTML = flights.map(f => `
                <div class="vc-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <span style="background: #FFF3EB; color: #E8610A; padding: 5px 15px; border-radius: 12px; font-size: 0.65rem; font-weight: 900;">VUELO ${f.flightNumber}</span>
                        <span style="color: #22c55e; font-size: 0.65rem; font-weight: 900;">● ${f.status}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="text-align: center;"><div style="font-size: 2.5rem; font-weight: 900; letter-spacing: -1px;">${f.origin?.code || 'EZE'}</div></div>
                        <img src="https://img.icons8.com/ios-filled/50/E8610A/airplane-mode-on.png" style="width: 25px; transform: rotate(90deg); opacity: 0.2;">
                        <div style="text-align: center;"><div style="font-size: 2.5rem; font-weight: 900; letter-spacing: -1px;">${f.destination?.code || 'MAD'}</div></div>
                    </div>
                </div>
            `).join('');
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-items');
            container.innerHTML = checklist.map(item => `
                <div onclick="toggleItem('${item.id}')" style="display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 20px; border: 1px solid ${item.completed ? '#e8f5e9' : '#eee'}; background: ${item.completed ? '#f9fdfa' : 'white'}; cursor: pointer; margin-bottom: 10px;">
                    <div style="width: 24px; height: 24px; border-radius: 8px; border: 2px solid ${item.completed ? '#22c55e' : '#ddd'}; background: ${item.completed ? '#22c55e' : 'transparent'}; display: flex; align-items: center; justify-content: center;">
                        ${item.completed ? '<img src="https://img.icons8.com/ios-filled/50/ffffff/checkmark.png" style="width: 12px;">' : ''}
                    </div>
                    <span style="font-size: 0.85rem; font-weight: 700; color: ${item.completed ? '#2e7d32' : '#333'}; text-decoration: ${item.completed ? 'line-through' : 'none'};">${item.text}</span>
                </div>
            `).join('');
        }

        async function toggleItem(id) {
            checklist = checklist.map(i => i.id === id ? {...i, completed: !i.completed} : i);
            renderChecklist();
            await db.collection('users').doc(currentUser.uid).set({ checklist }, { merge: true });
        }

        async function resetChecklist() {
            if (!confirm("¿Reiniciar lista?")) return;
            checklist = DEFAULT_CHECKLIST;
            renderChecklist();
            await db.collection('users').doc(currentUser.uid).set({ checklist }, { merge: true });
        }

        function openChecklist() { document.getElementById('checklist-modal').style.display = 'flex'; }
        function closeChecklist() { document.getElementById('checklist-modal').style.display = 'none'; }
    </script>
</body>
</html>
