<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VueloCheck VH</title>
    <style>
        body { font-family: sans-serif; background: #FDFBFA; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: white; width: 100%; padding: 15px; text-align: center; border-bottom: 2px solid #E8610A; font-weight: bold; color: #E8610A; }
        .container { padding: 20px; max-width: 400px; width: 100%; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #E8610A; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card { background: white; margin-top: 20px; padding: 20px; border-radius: 12px; border-left: 5px solid #E8610A; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <header>VUELOCHECK VH 🚀</header>
    <div class="container">
        <input type="text" id="vuelo" placeholder="Ej: AR1304">
        <button onclick="buscar()">RASTREAR VUELO</button>
        <div id="resultado"></div>
    </div>
    <script>
        function buscar() {
            const v = document.getElementById('vuelo').value.toUpperCase();
            if(!v) return;
            document.getElementById('resultado').innerHTML = `
                <div class="card">
                    <div style="font-size: 12px; color: #888;">VUELO ${v}</div>
                    <div style="display: flex; justify-content: space-between; font-size: 24px; font-weight: bold; margin: 10px 0;">
                        <span>EZE</span> ✈️ <span>MAD</span>
                    </div>
                    <div style="font-size: 14px; color: #666;">Estado: EN HORARIO</div>
                </div>`;
        }
    </script>
</body>
</html>
